[build.environment]
  VITE_BACKEND_URL = "https://smart-inbox-guard.onrender.com"
  VITE_ML_URL = "https://smart-inbox-guard-ml.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://smart-inbox-guard.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
